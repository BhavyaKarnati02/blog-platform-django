{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-body">

        <h2 class="mb-4">

            Edit Post

        </h2>

        <form
            method="POST"
            enctype="multipart/form-data"
        >

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-warning"
            >
                Update Post
            </button>

        </form>

    </div>

</div>

{% endblock %}
