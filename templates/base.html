<!DOCTYPE html>
<html>

<head>

    <title>Blog Platform</title>

</head>

<body>

    <h1>Blog Platform</h1>

    <hr>

    {% if user.is_authenticated %}

        <p>
            Welcome {{ user.username }}
        </p>

        <a href="{% url 'create_post' %}">
            Create Post
        </a>

        |

        <a href="{% url 'logout' %}">
            Logout
        </a>

    {% else %}

        <a href="{% url 'login' %}">
            Login
        </a>

    {% endif %}

    <hr>

    {% block content %}

    {% endblock %}

</body>

</html>
