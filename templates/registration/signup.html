{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0">

            <div class="card-body p-4">

                <h2 class="text-center mb-3">
                    Create Account
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-success w-100">
                        Sign Up
                    </button>

                </form>

                <p class="mt-3 text-center">

                    Already have an account?

                    <a href="{% url 'login' %}">
                        Login
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
